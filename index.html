<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <style>
        html {
    scroll-behavior: smooth;
}

/* Also, update your nav styling to handle the new <a> tags */
nav a {
    text-decoration: none;
    color: #00ffab;
    font-weight: bold;
    text-transform: uppercase;
    font-size: 0.9rem;
}

nav a:hover {
    text-decoration: underline;
}
        /* General Styles */
        body { 
            background: #1a1a1a; 
            color: #e0e0e0; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            line-height: 1.6;
        }

        /* Navigation */
        nav { 
            display: flex; 
            justify-content: center; 
            gap: 30px;
            padding: 1.5rem; 
            background: #252525; 
            border-bottom: 2px solid #333;
            position: sticky;
            top: 0;
        }
        
        nav span {
            color: #00ffab;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        nav span:hover {
            text-decoration: underline;
        }

        /* Container */
        .container { 
            padding: 4rem 2rem; 
            max-width: 800px; 
            margin: auto; 
        }

        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 2rem;
        }

        .highlight { 
            color: #00ffab; 
        }

        /* Content Cards */
        .card { 
            background: #252525; 
            padding: 2rem; 
            border-radius: 12px; 
            margin-bottom: 1.5rem; 
            border: 1px solid #333;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #00ffab;
        }

        h3 { 
            margin-top: 0; 
            color: #00ffab;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }

        ul {
            padding-left: 1.2rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            color: #666;
        }
    
    </style>
</head>
<body>

    <nav>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
</nav>

<div class="container">
    <h1>> Hello, I'm <span class="highlight">[Name]</span></h1>
    
    <div class="card" id="about">
        <h3>Background</h3>
        <p>[Bio content...]</p>
    </div>

    <div class="card" id="skills">
        <h3>Technical Skills</h3>
        <ul>
            <li>HTML, CSS, JavaScript, Python</li>
        </ul>
    </div>

    <div class="card" id="projects">
        <h3>Featured Projects</h3>
        <p>Project details...</p>
    </div>

    <div class="card" id="contact">
        <h3>Connect</h3>
        <p>Email: [Your Email]</p>
    </div>
</div>
    <footer>
        &copy; 2026 [Your Name]. Built with HTML/CSS.
    </footer>

</body>
</html>
